<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAND ESSA | نظام إدارة المتجر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a14; --bg-secondary: #111122; --bg-card: #161630; --gold: #d4a853;
            --text-primary: #e8e6e0; --text-secondary: #b0ada5; --border: #1e1e32;
            --sidebar-width: 260px; --sidebar-width-mobile: 60px; --footer-height: 50px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:var(--bg-primary); color:var(--text-primary); direction:rtl; min-height:100vh; padding-bottom: calc(var(--footer-height) + 10px); }
        .sidebar { position:fixed; top:0; right:0; width:var(--sidebar-width); height:100vh; background:#080814; border-left:1px solid var(--border); z-index:100; display:flex; flex-direction:column; box-shadow:-4px 0 30px rgba(0,0,0,0.6); overflow-y:auto; transition:0.3s; }
        .sidebar-logo { padding:24px 20px; text-align:center; border-bottom:1px solid var(--border); }
        .logo-icon { width:55px; height:55px; border-radius:50%; background:linear-gradient(135deg,#b8942e,#e8c97a); display:flex; align-items:center; justify-content:center; margin:0 auto 10px; font-weight:900; color:#1a1a10; box-shadow:0 0 30px rgba(212,168,83,0.25); }
        .sidebar-nav { flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:4px; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:13px 16px; border-radius:14px; cursor:pointer; color:#b0ada5; font-weight:600; border:1px solid transparent; transition:0.3s; white-space:nowrap; }
        .nav-item:hover,.nav-item.active { background:rgba(212,168,83,0.1); color:#e8c97a; border-color:#b8942e; }
        .nav-item i { font-size:18px; width:24px; text-align:center; flex-shrink:0; }
        .sidebar-footer-text { padding:16px; text-align:center; font-size:10px; color:#7a7770; border-top:1px solid var(--border); }
        .main-content { margin-right:var(--sidebar-width); min-height:100vh; padding:20px 28px; padding-bottom:calc(var(--footer-height) + 28px); transition:0.3s; }
        .header { display:flex; align-items:center; gap:10px; padding:14px 18px; background:var(--bg-card); border-radius:20px; border:1px solid var(--border); margin-bottom:20px; flex-wrap:wrap; }
        .profile-img,.profile-placeholder { width:50px; height:50px; border-radius:50%; border:3px solid #b8942e; flex-shrink:0; }
        .profile-placeholder { background:var(--bg-secondary); display:flex; align-items:center; justify-content:center; font-size:22px; color:#d4a853; }
        .header-info { flex:1; min-width:100px; }
        .brand-logo-text { font-size:13px; font-weight:700; letter-spacing:3px; color:#e8c97a; }
        .header-date { font-size:12px; background:var(--bg-secondary); padding:8px 14px; border-radius:30px; border:1px solid #2a2a40; white-space:nowrap; display:flex; align-items:center; gap:6px; }
        .header-search { flex:2; min-width:160px; position:relative; }
        .header-search input { width:100%; padding:10px 38px 10px 12px; border-radius:30px; border:2px solid var(--border); background:var(--bg-secondary); color:#fff; font-family:'Cairo'; outline:none; font-size:13px; }
        .header-search i { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:#d4a853; font-size:14px; }
        .reset-btn { background:linear-gradient(135deg,#b8942e,#d4a853); color:#1a1a10; border:none; padding:10px 16px; border-radius:30px; cursor:pointer; font-family:'Cairo'; font-weight:700; font-size:13px; display:flex; align-items:center; gap:6px; transition:0.3s; white-space:nowrap; }
        .portfolio-link { display:flex; align-items:center; justify-content:center; width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#b8942e,#d4a853); color:#1a1a10; font-size:18px; transition:0.3s; text-decoration:none; }
        .portfolio-link:hover { filter:brightness(1.2); transform:scale(1.05); }
        .cards-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
        .card { background:var(--bg-card); border-radius:18px; padding:18px 16px; border:1px solid var(--border); box-shadow:0 8px 32px rgba(0,0,0,0.5); }
        .card-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:12px; }
        .card-label { font-size:11px; color:#7a7770; text-transform:uppercase; letter-spacing:1px; }
        .card-value { font-size:22px; font-weight:800; color:#fff; }
        .page-section { display:none; animation:fadeSlide 0.4s ease; }
        .page-section.active { display:block; }
        @keyframes fadeSlide { from{opacity:0;transform:translateY(20px);} }
        .table-container { background:var(--bg-card); border-radius:18px; border:1px solid var(--border); overflow-x:auto; margin-top:16px; }
        .table-container table { width:100%; border-collapse:collapse; font-size:12px; min-width:600px; }
        .table-container th,.table-container td { padding:10px 12px; text-align:right; border-bottom:1px solid #2a2a40; white-space:nowrap; }
        .table-container th { background:var(--bg-secondary); color:#d4a853; font-weight:700; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
        .form-card { background:var(--bg-card); border-radius:18px; padding:20px; border:1px solid var(--border); margin-bottom:16px; }
        .form-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; align-items:flex-end; }
        .form-group { display:flex; flex-direction:column; gap:5px; flex:1; min-width:130px; }
        .form-group label { font-size:11px; font-weight:600; color:#b0ada5; }
        .form-group input,.form-group select { padding:10px 12px; border-radius:8px; border:2px solid var(--border); background:var(--bg-secondary); color:#fff; font-family:'Cairo'; font-size:13px; outline:none; }
        .btn { padding:10px 18px; border-radius:30px; font-family:'Cairo'; font-weight:700; cursor:pointer; border:none; display:inline-flex; align-items:center; gap:6px; font-size:13px; transition:0.3s; }
        .btn-gold { background:linear-gradient(135deg,#b8942e,#d4a853); color:#1a1a10; }
        .btn-outline { background:transparent; border:2px solid #b8942e; color:#d4a853; }
        .btn-danger { background:#e04848; color:#fff; }
        .btn-sm { padding:6px 12px; font-size:11px; }
        .btn-xs { padding:4px 8px; font-size:10px; border-radius:20px; }
        .fixed-footer { position:fixed; bottom:0; left:0; right:var(--sidebar-width); height:var(--footer-height); background:#080814; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:center; z-index:99; font-size:10px; color:#7a7770; letter-spacing:1px; font-weight:500; transition:0.3s; }
        .toast-container { position:fixed; bottom:70px; left:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
        .toast { background:var(--bg-card); border:1px solid var(--border); padding:12px 16px; border-radius:14px; color:#fff; font-weight:600; font-size:12px; box-shadow:0 16px 48px rgba(0,0,0,0.65); animation:slideIn 0.35s ease; min-width:200px; }
        .toast.success { border-right:3px solid #3ecf8e; }
        .toast.error { border-right:3px solid #e04848; }
        @keyframes slideIn { from{opacity:0;transform:translateX(-40px);} }
        .red-text { color:#e04848; }
        .row-danger { background:rgba(224,72,72,0.15)!important; }
        .copy-barcode { cursor:pointer; color:#d4a853; margin-right:6px; font-size:14px; transition:0.2s; }
        .copy-barcode:hover { color:#e8c97a; transform:scale(1.1); }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; display:flex; align-items:center; justify-content:center; }
        .modal { background:var(--bg-card); border-radius:20px; padding:24px; border:1px solid var(--border); max-width:450px; width:90%; }
        .modal input { width:100%; padding:12px; border-radius:10px; border:2px solid var(--border); background:var(--bg-secondary); color:#fff; font-size:16px; text-align:center; font-family:'Cairo'; outline:none; }
        .date-card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:14px; cursor:pointer; transition:0.3s; display:flex; justify-content:space-between; align-items:center; }
        .date-card:hover { border-color:#d4a853; }
        .date-card.active-date { border-color:#d4a853; background:rgba(212,168,83,0.1); }
        /* تحسينات الجوال */
        @media (max-width:768px) {
            .sidebar { width:var(--sidebar-width-mobile); }
            .sidebar-logo { padding:16px 8px; }
            .logo-icon { width:38px; height:38px; font-size:14px; }
            .sidebar .brand-name,.sidebar .nav-item span,.sidebar-footer-text { display:none; }
            .nav-item { justify-content:center; padding:12px; gap:0; }
            .nav-item i { font-size:18px; width:auto; }
            .main-content { margin-right:var(--sidebar-width-mobile); padding:12px 14px; }
            .fixed-footer { right:var(--sidebar-width-mobile); font-size:9px; }
            .header { padding:10px 12px; gap:8px; }
            .header-date { font-size:10px; padding:6px 10px; }
            .header-search input { font-size:11px; padding:8px 32px 8px 10px; }
            .reset-btn { font-size:11px; padding:8px 12px; }
            .cards-grid { grid-template-columns:1fr 1fr; gap:10px; }
            .card { padding:14px 12px; }
            .card-value { font-size:18px; }
            .table-container table { font-size:10px; min-width:auto; }
            .btn { font-size:11px; padding:8px 14px; }
            .form-card { padding:14px; }
            .pos-layout, .archive-layout { grid-template-columns:1fr!important; }
        }
        @media (max-width:480px) {
            .cards-grid { grid-template-columns:1fr; }
            .header { flex-direction:column; align-items:stretch; }
            .header-search { min-width:100%; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">BE</div>
            <div class="brand-name" style="color:#e8c97a;font-weight:700;letter-spacing:3px;">BRAND ESSA</div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav">
            <div class="nav-item active" data-page="dashboard"><i class="fa-solid fa-grid-2"></i> <span>لوحة التحكم</span></div>
            <div class="nav-item" data-page="inventory"><i class="fa-solid fa-boxes-stacked"></i> <span>المخزون</span></div>
            <div class="nav-item" data-page="pos"><i class="fa-solid fa-cash-register"></i> <span>نقطة البيع</span></div>
            <div class="nav-item" data-page="returns"><i class="fa-solid fa-rotate-left"></i> <span>المرتجعات</span></div>
            <div class="nav-item" data-page="trash"><i class="fa-solid fa-trash-can"></i> <span>سلة المحذوفات</span></div>
            <div class="nav-item" data-page="archive"><i class="fa-solid fa-calendar-week"></i> <span>سجل التواريخ</span></div>
        </nav>
        <div class="sidebar-footer-text">BRAND ESSA © 2026</div>
    </aside>

    <div class="main-content" id="mainContent">
        <header class="header">
            <img src="1.jpg" alt="Profile" class="profile-img" id="profileImg" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="profile-placeholder" id="profilePlaceholder" style="display:none;"><i class="fa-solid fa-crown"></i></div>
            <div class="header-info"><div class="brand-logo-text">BRAND ESSA</div></div>
            <div class="header-date"><i class="fa-solid fa-calendar-days"></i> <span id="dateText"></span></div>
            <div class="header-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="globalSearch" placeholder="🔍 بحث عن قطعة أو فاتورة..."></div>
            <a href="https://ehabashraf20.vercel.app" target="_blank" class="portfolio-link" title="Ehab Ashraf Portfolio"><i class="fa-solid fa-id-card"></i></a>
            <button class="reset-btn" onclick="showResetModal()"><i class="fa-solid fa-box-archive"></i> راسترو</button>
        </header>

        <section class="page-section active" id="page-dashboard">
            <div class="cards-grid">
                <div class="card"><div class="card-icon" style="background:rgba(62,207,142,0.15);color:#3ecf8e;"><i class="fa-solid fa-coins"></i></div><div class="card-label">💰 إجمالي المبيعات</div><div class="card-value" id="cardSales">0 ج.م</div></div>
                <div class="card"><div class="card-icon" style="background:rgba(224,72,72,0.15);color:#e04848;"><i class="fa-solid fa-money-bill-wave"></i></div><div class="card-label">💸 إجمالي المشتريات</div><div class="card-value" id="cardPurchases">0 ج.م</div></div>
                <div class="card"><div class="card-icon" style="background:rgba(232,168,64,0.15);color:#e8a840;"><i class="fa-solid fa-chart-line"></i></div><div class="card-label">📊 صافي الربح</div><div class="card-value" id="cardNetProfit">0 ج.م</div></div>
            </div>
            <div class="table-container"><h3 style="padding:14px;color:#d4a853;font-size:14px;">آخر العمليات</h3><table><thead><tr><th>النوع</th><th>التفاصيل</th><th>المبلغ</th><th>التاريخ</th><th>نسخ</th></tr></thead><tbody id="recentActivity"></tbody></table></div>
        </section>

        <!-- باقي الأقسام (المخزون، نقطة البيع، المرتجعات، سلة المحذوفات، الأرشيف) تبقى كما هي مع تعديلات طفيفة في الـ grid للموبايل -->
        <!-- تم تضمينها في الكود الكامل ولكن نختصر هنا للعرض -->
    </div>

    <footer class="fixed-footer">Powered by <span style="color:#d4a853;font-weight:700;">Ehab Ashraf</span> | ELBOOB © 2026</footer>
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ... (نفس دوال Firebase والإعدادات السابقة، مع تعديل وظائف الراسترو)
        // confirmReset تقرأ الرقم السري وتنفذ الإجراء المناسب:
        async function confirmReset() {
            const pin = document.getElementById('resetPin')?.value.trim();
            if (pin === '1212') {
                // أرشفة فقط بدون تصفير المشتريات
                const sales = await getCollection('sales');
                const returns = await getCollection('returns');
                const allActs = [];
                sales.forEach(s => allActs.push({ type: 'بيع', detail: 'فاتورة #' + (s.invoiceNumber || s.id), amount: s.totalAmount, date: s.createdAt, ref: s.invoiceNumber || s.id }));
                returns.forEach(r => allActs.push({ type: 'مرتجع', detail: `${r.itemName} (${r.invoiceNumber})`, amount: -r.refundAmount, date: r.createdAt, ref: r.invoiceNumber, isReturn: true }));
                if (allActs.length > 0) {
                    const today = new Date(), days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
                    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
                    const dateLabel = `${days[today.getDay()]}، ${today.getDate()} ${months[today.getMonth()]} ${today.getFullYear()}`;
                    const dateISO = today.toISOString().split('T')[0];
                    const archives = await getCollection('archives');
                    const existingArchive = archives.find(a => a.dateISO === dateISO);
                    if (existingArchive) {
                        const mergedOps = [...existingArchive.operations, ...allActs];
                        const summary = { totalSales: mergedOps.filter(a => a.type === 'بيع').reduce((s, a) => s + (a.amount > 0 ? a.amount : 0), 0), totalReturns: mergedOps.filter(a => a.type === 'مرتجع').reduce((s, a) => s + Math.abs(a.amount), 0), count: mergedOps.length };
                        await updateDocument('archives', existingArchive.id, { operations: mergedOps, summary, archivedAt: new Date().toISOString() });
                    } else {
                        const archiveEntry = { dateLabel, dateISO, operations: allActs, archivedAt: new Date().toISOString(), summary: { totalSales: allActs.filter(a => a.type === 'بيع').reduce((s, a) => s + (a.amount > 0 ? a.amount : 0), 0), totalReturns: allActs.filter(a => a.type === 'مرتجع').reduce((s, a) => s + Math.abs(a.amount), 0), count: allActs.length } };
                        await addDocument('archives', archiveEntry);
                    }
                }
                // حذف العمليات الحالية (مبيعات ومرتجعات) فقط
                for (const s of sales) await deleteDocument('sales', s.id);
                for (const r of returns) await deleteDocument('returns', r.id);
                // لا نلمس totalPurchases
                showToast('✅ تمت أرشفة العمليات بنجاح');
            } else if (pin === '1234') {
                // تصفير كامل مع الأرشفة
                const sales = await getCollection('sales');
                const returns = await getCollection('returns');
                const allActs = [];
                sales.forEach(s => allActs.push({ type: 'بيع', detail: 'فاتورة #' + (s.invoiceNumber || s.id), amount: s.totalAmount, date: s.createdAt, ref: s.invoiceNumber || s.id }));
                returns.forEach(r => allActs.push({ type: 'مرتجع', detail: `${r.itemName} (${r.invoiceNumber})`, amount: -r.refundAmount, date: r.createdAt, ref: r.invoiceNumber, isReturn: true }));
                if (allActs.length > 0) {
                    const today = new Date(), days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
                    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
                    const dateLabel = `${days[today.getDay()]}، ${today.getDate()} ${months[today.getMonth()]} ${today.getFullYear()}`;
                    const dateISO = today.toISOString().split('T')[0];
                    const archives = await getCollection('archives');
                    const existingArchive = archives.find(a => a.dateISO === dateISO);
                    if (existingArchive) {
                        const mergedOps = [...existingArchive.operations, ...allActs];
                        const summary = { totalSales: mergedOps.filter(a => a.type === 'بيع').reduce((s, a) => s + (a.amount > 0 ? a.amount : 0), 0), totalReturns: mergedOps.filter(a => a.type === 'مرتجع').reduce((s, a) => s + Math.abs(a.amount), 0), count: mergedOps.length };
                        await updateDocument('archives', existingArchive.id, { operations: mergedOps, summary, archivedAt: new Date().toISOString() });
                    } else {
                        const archiveEntry = { dateLabel, dateISO, operations: allActs, archivedAt: new Date().toISOString(), summary: { totalSales: allActs.filter(a => a.type === 'بيع').reduce((s, a) => s + (a.amount > 0 ? a.amount : 0), 0), totalReturns: allActs.filter(a => a.type === 'مرتجع').reduce((s, a) => s + Math.abs(a.amount), 0), count: allActs.length } };
                        await addDocument('archives', archiveEntry);
                    }
                }
                for (const s of sales) await deleteDocument('sales', s.id);
                for (const r of returns) await deleteDocument('returns', r.id);
                setTotalPurchases(0); // تصفير المشتريات
                showToast('✅ تم تصفير الحسابات وبدء شهر جديد');
            } else {
                showToast('❌ الرقم السري غير صحيح', 'error');
            }
            document.getElementById('resetModal')?.remove();
            refreshDashboard(); loadReturnsTable(); loadArchivePage();
        }
        // ... باقي الدوال كما هي
    </script>
</body>
</html>
